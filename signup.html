{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-slate-800">Join the Team</h2>
        <p class="text-slate-500 mt-2">Create your ORYX account</p>
    </div>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
            <input type="text" name="full_name" placeholder="John Doe" required 
                   class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
            <input type="text" name="username" placeholder="johndoe123" required 
                   class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
            <input type="password" name="password" placeholder="••••••••" required 
                   class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-100 transition-all transform hover:scale-[1.02]">
            Create Account
        </button>
    </form>
    <div class="mt-6 text-center text-sm">
        <span class="text-slate-500">Already have an account?</span>
        <a href="/login" class="text-blue-600 font-bold ml-1 hover:underline">Log In</a>
    </div>
</div>
{% endblock %}
