{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-slate-800">Welcome Back</h2>
        <p class="text-slate-500 mt-2">Log in to your team dashboard</p>
    </div>
    <form method="POST" class="space-y-4">
        <div>
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
            <input type="text" id="username" name="username" required 
                   placeholder="Enter your username" title="Username"
                   class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required
                   placeholder="Enter your password" title="Password"
                   class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        <button type="submit" title="Sign into your account" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold shadow-lg transition-all transform hover:scale-[1.02]">
            Sign In
        </button>
    </form>
    <div class="mt-6 text-center text-sm">
        <span class="text-slate-500">Need an account?</span>
        <a href="/signup" class="text-blue-600 font-bold ml-1 hover:underline">Sign Up</a>
    </div>
</div>
{% endblock %}
